<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#002D72;--blue:#0057A8;--mid:#1A75C9;--sky:#5BA4D8;
  --pale:#EEF4FB;--green:#86BC25;--lime:#A8D840;--white:#FFFFFF;
  --gray:#7A8FAA;--dark:#0B1624;
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%;}
.bg-mesh{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 15%,rgba(0,87,168,0.28) 0%,transparent 65%),radial-gradient(ellipse 60% 50% at 85% 80%,rgba(134,188,37,0.07) 0%,transparent 60%),radial-gradient(ellipse 100% 100% at 50% 50%,#0A1628 0%,#060E1C 100%);}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,87,168,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,87,168,0.05) 1px,transparent 1px);background-size:40px 40px;}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(0,87,168,0.3),transparent);animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(105vh) rotate(0deg);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:translateY(-120px) rotate(720deg);opacity:0}}
.flash{position:fixed;inset:0;z-index:200;background:rgba(0,87,168,0.12);pointer-events:none;opacity:0;transition:opacity 0.18s ease;}
.flash.on{opacity:1;}

/* TOPBAR */
.topbar{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;}
.brand-text .co{font-family:'Sora',sans-serif;font-weight:700;font-size:11pt;}
.brand-text .div{font-size:7pt;color:var(--sky);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.tr-logo-wrap{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 8px;display:flex;align-items:center;}
.tr-logo-wrap img{height:28px;width:auto;display:block;border-radius:3px;}
.conf-badge{background:rgba(134,188,37,0.12);border:1px solid rgba(134,188,37,0.3);border-radius:20px;padding:5px 12px;font-size:7pt;font-weight:700;color:var(--lime);letter-spacing:0.5px;text-transform:uppercase;}

/* HERO */
.hero{position:relative;z-index:5;text-align:center;padding:24px 16px 16px;}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(0,87,168,0.18);border:1px solid rgba(0,87,168,0.38);border-radius:20px;padding:5px 14px;font-size:7.5pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sky);margin-bottom:12px;animation:fadeDown 0.7s ease both;}
.hero-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulseDot 2s infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(1.5)}}
.hero h1{font-family:'Sora',sans-serif;font-size:22pt;font-weight:800;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#FFFFFF 0%,#A8CCF0 55%,var(--sky) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeDown 0.7s 0.08s ease both;}
.hero h1 em{background:linear-gradient(135deg,var(--green),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal;}
.hero p{font-size:9pt;color:rgba(255,255,255,0.52);max-width:100%;margin:0 auto 16px;line-height:1.6;animation:fadeDown 0.7s 0.16s ease both;padding:0 8px;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

/* SCENE NAV - Question selector button + dropdown */
.scene-nav{display:flex;justify-content:center;align-items:center;gap:8px;padding:0 16px 12px;position:relative;z-index:20;}
.q-select-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:12px;font-size:8.5pt;font-weight:700;cursor:pointer;border:1px solid rgba(0,87,168,0.5);color:var(--sky);background:rgba(0,87,168,0.18);transition:all 0.22s ease;white-space:nowrap;user-select:none;width:100%;max-width:380px;justify-content:space-between;}
.q-select-btn:hover{background:rgba(0,87,168,0.28);border-color:rgba(91,164,216,0.6);}
.q-select-btn .q-num-badge{background:rgba(0,87,168,0.4);border:1px solid rgba(91,164,216,0.4);border-radius:7px;padding:2px 8px;font-family:'Sora',sans-serif;font-size:7pt;font-weight:700;color:rgba(255,255,255,0.75);letter-spacing:0.5px;flex-shrink:0;}
.q-select-btn .q-title-text{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;color:white;font-size:8pt;}
.q-select-btn .q-arrow{font-size:10pt;transition:transform 0.22s;flex-shrink:0;color:var(--sky);}
.q-select-btn.open .q-arrow{transform:rotate(180deg);}
/* Dropdown panel */
.q-dropdown{position:absolute;top:calc(100% - 4px);left:16px;right:16px;max-width:380px;margin:0 auto;background:#0B1D3A;border:1px solid rgba(0,87,168,0.5);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,10,0.7);z-index:999;overflow:hidden;display:none;animation:dropIn 0.2s ease both;left:50%;transform:translateX(-50%);width:calc(100% - 32px);}
.q-dropdown.open{display:block;}
@keyframes dropIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.q-dropdown-header{padding:10px 14px 6px;font-size:6.5pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);border-bottom:1px solid rgba(255,255,255,0.06);}
.q-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.15s ease;border-bottom:1px solid rgba(255,255,255,0.04);}
.q-item:last-child{border-bottom:none;}
.q-item:hover{background:rgba(0,87,168,0.22);}
.q-item.active{background:rgba(0,87,168,0.28);}
.q-item-num{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:2px 7px;font-family:'Sora',sans-serif;font-size:6.5pt;font-weight:700;color:rgba(255,255,255,0.55);flex-shrink:0;margin-top:1px;}
.q-item.active .q-item-num{background:rgba(0,87,168,0.5);border-color:rgba(91,164,216,0.5);color:var(--sky);}
.q-item-title{font-size:8pt;font-weight:600;color:rgba(255,255,255,0.72);line-height:1.35;}
.q-item.active .q-item-title{color:white;}
.q-item-tag{font-size:6pt;margin-top:3px;opacity:0.6;}

/* PROGRESS */
.prog-wrap{max-width:100%;margin:0 auto;padding:0 16px 8px;position:relative;z-index:5;}
.prog-track{height:3px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}

/* PIPS */
.pips{display:flex;align-items:center;justify-content:center;gap:7px;padding:6px 0;flex-wrap:wrap;}
.pip{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.18);cursor:pointer;transition:all 0.3s ease;}
.pip.active{background:var(--green);transform:scale(1.45);}
.pip.done{background:var(--sky);}
.pip-label{text-align:center;font-size:7pt;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray);margin-bottom:16px;}
.pip-label span{color:var(--sky);font-weight:700;}

/* STAGE */
.stage{position:relative;z-index:5;max-width:100%;margin:0 auto;padding:0 12px 60px;}

/* SCENE CARD */
.scene-card{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;backdrop-filter:blur(24px);display:none;animation:sceneIn 0.48s cubic-bezier(0.34,1.56,0.64,1) both;}
.scene-card.active{display:block;}
@keyframes sceneIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* CARD TOPBAR */
.card-topbar{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.1);}
.card-top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.card-num{background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.2);border-radius:7px;padding:4px 10px;font-family:'Sora',sans-serif;font-size:7pt;font-weight:700;color:rgba(255,255,255,0.65);letter-spacing:1px;text-transform:uppercase;}
.ctag{padding:4px 10px;border-radius:14px;font-size:6pt;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
.t-common{background:rgba(134,188,37,0.18);color:var(--lime);border:1px solid rgba(134,188,37,0.3);}
.t-sensitive{background:rgba(245,166,35,0.14);color:#FFD080;border:1px solid rgba(245,166,35,0.28);}
.t-boundary{background:rgba(91,164,216,0.14);color:#9DD0F0;border:1px solid rgba(91,164,216,0.28);}
.t-action{background:rgba(0,87,168,0.28);color:#8EC8F8;border:1px solid rgba(0,87,168,0.38);}
.t-senior{background:rgba(200,150,255,0.14);color:#D8B4FE;border:1px solid rgba(200,150,255,0.28);}
.card-title{font-family:'Sora',sans-serif;font-size:10.5pt;font-weight:700;color:white;line-height:1.3;}
.card-ctx{font-size:7pt;color:rgba(255,255,255,0.52);margin-top:3px;font-style:italic;}

/* CONVERSATION - stacked on mobile */
.conv{padding:14px 12px 12px;display:flex;flex-direction:column;gap:12px;}
.conv-avatars{display:flex;justify-content:space-between;align-items:flex-start;}
.char-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.char-wrap{position:relative;width:64px;}
.avatar{width:64px;height:90px;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);cursor:default;}
.avatar svg{width:64px;height:90px;}
.avatar.speaking{transform:scale(1.08) translateY(-4px);}
.avatar.idle{opacity:0.6;transform:scale(0.93);}
.speak-ind{position:absolute;top:-4px;right:-4px;width:17px;height:17px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:7pt;opacity:0;transform:scale(0);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 0 3px rgba(134,188,37,0.18);}
.speak-ind.on{opacity:1;transform:scale(1);}
.char-name{font-size:8.5pt;font-weight:800;color:white;text-align:center;}
.char-role{font-size:6.5pt;color:var(--gray);text-align:center;margin-top:-5px;max-width:80px;line-height:1.2;}

/* DIALOGUE */
.dial{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:260px;padding:0 2px;}
.dial::-webkit-scrollbar{width:3px;}
.dial::-webkit-scrollbar-thumb{background:rgba(0,87,168,0.35);border-radius:2px;}
.msg{opacity:0;transform:translateY(10px);transition:all 0.44s cubic-bezier(0.34,1.56,0.64,1);}
.msg.show{opacity:1;transform:translateY(0);}
.spk-tag{font-size:7pt;font-weight:700;margin-bottom:3px;letter-spacing:0.3px;}
.msg.employee .spk-tag{color:var(--sky);text-align:left;}
.msg.hrbp .spk-tag{color:var(--lime);}
.bubble{border-radius:12px;padding:10px 13px;font-size:8.5pt;line-height:1.6;}
.msg.employee .bubble{background:rgba(0,87,168,0.22);border:1px solid rgba(0,87,168,0.42);color:rgba(255,255,255,0.9);border-bottom-left-radius:3px;margin-right:12%;}
.msg.hrbp .bubble{background:rgba(10,22,42,0.65);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.88);border-bottom-right-radius:3px;margin-left:12%;}
.typing-bubble{display:none;align-items:center;gap:4px;background:rgba(10,22,42,0.55);border:1px solid rgba(255,255,255,0.08);border-radius:12px;border-bottom-right-radius:3px;padding:9px 13px;width:fit-content;margin-left:12%;}
.typing-bubble.show{display:flex;}
.td{width:6px;height:6px;border-radius:50%;background:var(--sky);animation:bounce 1.2s infinite;}
.td:nth-child(2){animation-delay:0.2s}.td:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* RESPONSE PANEL - single column on mobile */
.resp-panel{margin:0 12px 14px;display:flex;flex-direction:column;gap:10px;}
.rc{border-radius:11px;padding:12px 14px;opacity:0;transform:translateY(8px);transition:all 0.44s cubic-bezier(0.34,1.56,0.64,1);}
.rc.show{opacity:1;transform:translateY(0);}
.rc.say{background:#E6F4DC;border:1.5px solid #8BC87A;}
.rc.avoid{background:#FDEAEA;border:1.5px solid #E8A0A0;}
.rc-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.rc-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11pt;flex-shrink:0;}
.say .rc-ico{background:rgba(134,188,37,0.18);}
.avoid .rc-ico{background:rgba(220,80,80,0.14);}
.rc-lbl{font-size:7pt;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.say .rc-lbl{color:#2A6A0A;}
.avoid .rc-lbl{color:#8A1010;}
.rc-txt{font-size:8pt;line-height:1.6;font-style:italic;}
.say .rc-txt{color:#1A4A08;}
.avoid .rc-txt{color:#5A0808;}

/* INSIGHT */
.insight{margin:0 12px 16px;background:rgba(0,87,168,0.1);border:1px solid rgba(0,87,168,0.24);border-left:4px solid var(--blue);border-radius:0 9px 9px 0;padding:10px 13px;font-size:8pt;line-height:1.58;color:rgba(255,255,255,0.68);opacity:0;transform:translateX(-6px);transition:all 0.42s ease 0.15s;}
.insight.show{opacity:1;transform:translateX(0);}
.insight strong{color:var(--sky);font-weight:700;}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:center;gap:10px;padding:0 12px 24px;}
.btn{display:flex;align-items:center;gap:5px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:9pt;border-radius:10px;padding:10px 16px;transition:all 0.24s ease;-webkit-tap-highlight-color:transparent;}
.btn-prev{background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.65);}
.btn-next{background:linear-gradient(135deg,var(--blue),var(--mid));color:white;box-shadow:0 4px 14px rgba(0,87,168,0.38);}
.btn-replay{background:rgba(134,188,37,0.1);border:1px solid rgba(134,188,37,0.28);color:var(--lime);}
.watermark{position:fixed;bottom:12px;right:14px;z-index:5;font-size:6pt;color:rgba(255,255,255,0.1);letter-spacing:0.5px;text-transform:uppercase;font-weight:700;}
</style>
</head>

    num:"01", tag:"Common", tagClass:"t-common",
    title:"Why is my salary structure changing?",
    ctx:"Employee is confused about the restructuring and wants a simple explanation",
    empName:"Rohan K.", empRole:"Associate Director",
    hrName:"Priya M.", hrRole:"HR Business Partner",
    lines:[
      {who:"employee", text:"Priya, I got this communication about my salary structure changing. Honestly, I don't fully understand why this is happening."},
      {who:"hrbp", typing:true, text:"Totally fair question, Rohan. So India's Labour Codes — specifically the Code on Wages 2019 and Code on Social Security 2020 — came into effect on 21st November 2025."},
      {who:"hrbp", text:"PepsiCo has updated the pay structure to stay fully compliant with these. The important thing to know is your Total Fixed Pay stays exactly the same. It's a repackaging, not a reduction."},
      {who:"employee", text:"So the amount I actually take home doesn't change?"},
      {who:"hrbp", text:"Correct. Your total is unchanged. What's different is how it's labelled and categorised across components. I can walk you through the breakdown if that helps."}
    ],
    say:"India's new Labour Codes came into effect in November 2025. PepsiCo restructured pay to stay compliant. Your Total Fixed Pay is unchanged — only the component breakdown looks different.",
    avoid:"Don't just say 'it's a compliance thing, don't worry.' That dismisses a valid concern. Always walk through what actually changed and reassure with specifics.",
    insight:"<strong>Key tip:</strong> Lead with 'your total pay is unchanged' — that's what employees actually care about. Then explain why the structure looks different."
  },

      {who:"hrbp", text:"Employer PF stays at 12% of Basic, no change there. Then your remaining flexi balance is available for Meal Coupons, LTC, NPS, PDA, Car Lease if you're L06+, Vehicle R&M, and Landline Allowance."},
      {who:"employee", text:"And if I don't allocate anything?"},
      {who:"hrbp", text:"Whatever's unallocated goes into Conveyance Allowance — up to 40% of Basic — and it becomes fully taxable. So it's worth taking a few minutes to make your selections thoughtfully."}

    say:"Basic stays as is. HRA is fixed at 60% of Basic — automatic. PF at 12%. Remaining balance goes into flexi: Meal Coupons, LTC, NPS, PDA, Car Lease (L06+), Vehicle R&M, Landline. Anything unallocated becomes taxable Conveyance Allowance.",
    avoid:"Don't give a vague summary. Employees making financial decisions need the full picture. Walk through each component clearly.",

function buildScene(s, idx) {
  var d = document.createElement('div');
  d.className = 'scene-card';
  d.id = 'sc-' + idx;
  d.innerHTML =
    '<div class="card-topbar">' +
      '<div class="card-top-row1">' +
        '<div class="card-num">Scenario ' + s.num + '</div>' +
        '<div class="ctag ' + s.tagClass + '">' + s.tag + '</div>' +
      '</div>' +
      '<div class="card-title">' + s.title + '</div>' +
      '<div class="card-ctx">' + s.ctx + '</div>' +
    '</div>' +
    '<div class="conv">' +
      '<div class="conv-avatars">' +
        '<div class="char-col">' +
          '<div class="char-wrap">' +
            '<div class="avatar" id="ea-' + idx + '">' + empSVG() + '</div>' +
            '<div class="speak-ind" id="ei-' + idx + '">&#x1F4AC;</div>' +
          '</div>' +
          '<div class="char-name">' + s.empName + '</div>' +
          '<div class="char-role">' + s.empRole + '</div>' +
        '</div>' +
        '<div class="char-col">' +
          '<div class="char-wrap">' +
            '<div class="avatar" id="ha-' + idx + '">' + hrSVG() + '</div>' +
            '<div class="speak-ind" id="hi-' + idx + '">&#x1F4AC;</div>' +
          '</div>' +
          '<div class="char-name">' + s.hrName + '</div>' +
          '<div class="char-role">' + s.hrRole + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="dial" id="dl-' + idx + '"></div>' +
    '</div>' +
    '<div class="resp-panel">' +
      '<div class="rc say" id="say-' + idx + '">' +
        '<div class="rc-head"><div class="rc-ico">&#x2705;</div><div class="rc-lbl">What to Say</div></div>' +
        '<div class="rc-txt">' + s.say + '</div>' +
      '</div>' +
      '<div class="rc avoid" id="av-' + idx + '">' +
        '<div class="rc-head"><div class="rc-ico">&#x26A0;&#xFE0F;</div><div class="rc-lbl">What to Avoid</div></div>' +
        '<div class="rc-txt">' + s.avoid + '</div>' +

    '</div>' +
    '<div class="insight" id="ins-' + idx + '">&#x1F4A1; ' + s.insight + '</div>';

var cur = 0, timer = null;

var dropdownOpen = false;

function toggleDropdown() {
  dropdownOpen = !dropdownOpen;
  var btn = document.getElementById('qSelectBtn');
  var dd = document.getElementById('qDropdown');
  btn.classList.toggle('open', dropdownOpen);
  dd.classList.toggle('open', dropdownOpen);
}

function closeDropdown() {
  dropdownOpen = false;
  document.getElementById('qSelectBtn').classList.remove('open');
  document.getElementById('qDropdown').classList.remove('open');
}

function updateNavDisplay(idx) {
  var s = scenarios[idx];
  document.getElementById('qBadge').textContent = 'Q' + s.num;
  document.getElementById('qTitleText').textContent = s.title;
  var items = document.querySelectorAll('.q-item');
  for (var i = 0; i < items.length; i++) items[i].classList.toggle('active', i === idx);
}

function init() {
  var container = document.getElementById('sceneContainer');
  var pips = document.getElementById('pips');
  var qList = document.getElementById('qList');
  document.getElementById('totNum').textContent = scenarios.length;
  for (var i = 0; i < scenarios.length; i++) {
    container.appendChild(buildScene(scenarios[i], i));
    // Build dropdown item
    var item = document.createElement('div');
    item.className = 'q-item' + (i === 0 ? ' active' : '');
    item.setAttribute('data-idx', i);
    item.innerHTML = '<span class="q-item-num">Q' + scenarios[i].num + '</span>' +
      '<span class="q-item-title">' + scenarios[i].title + '</span>';
    item.onclick = (function(idx){ return function(){ jumpTo(idx); closeDropdown(); }; })(i);
    qList.appendChild(item);
    // Build pip
    var pip = document.createElement('div');
    pip.className = 'pip' + (i === 0 ? ' active' : '');
    pip.setAttribute('data-idx', i);
    pip.setAttribute('title', 'Q' + scenarios[i].num + ': ' + scenarios[i].title);
    pip.onclick = (function(idx){ return function(){ jumpTo(idx); }; })(i);
    pips.appendChild(pip);
  }
  updateNavDisplay(0);
  show(0, false);
  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (dropdownOpen && !e.target.closest('#sceneNav')) {
      closeDropdown();
    }
  });
}

function show(idx, animate) {
  if (animate === undefined) animate = true;
  if (timer) { clearTimeout(timer); timer = null; }
  if (animate) {
    var f = document.getElementById('flash');
    f.classList.add('on');
    setTimeout(function(){ f.classList.remove('on'); }, 280);
  }
  var cards = document.querySelectorAll('.scene-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('active');
  var allPips = document.querySelectorAll('.pip');
  for (var i = 0; i < allPips.length; i++) {
    allPips[i].classList.remove('active');
    if (i < idx) allPips[i].classList.add('done');
    else allPips[i].classList.remove('done');
  }
  allPips[idx].classList.add('active');
  document.getElementById('sc-' + idx).classList.add('active');
  cur = idx;
  updateNavDisplay(idx);
  document.getElementById('curNum').textContent = idx + 1;
  document.getElementById('progFill').style.width = (idx / (scenarios.length - 1) * 100) + '%';
  var btnPrev = document.getElementById('btnPrev');
  btnPrev.disabled = idx === 0;
  btnPrev.style.opacity = idx === 0 ? '0.3' : '1';
  document.getElementById('btnNext').textContent = idx === scenarios.length - 1 ? '✓ Done' : 'Next →';
  document.getElementById('dl-' + idx).innerHTML = '';
  document.getElementById('say-' + idx).classList.remove('show');
  document.getElementById('av-' + idx).classList.remove('show');
  document.getElementById('ins-' + idx).classList.remove('show');
  document.getElementById('ea-' + idx).className = 'avatar idle';
  document.getElementById('ha-' + idx).className = 'avatar idle';
  document.getElementById('ei-' + idx).classList.remove('on');
  document.getElementById('hi-' + idx).classList.remove('on');
  setTimeout(function(){ play(idx, 0); }, animate ? 580 : 280);
}

function play(si, li) {
  var s = scenarios[si];
  if (li >= s.lines.length) {
    setTimeout(function(){
      document.getElementById('say-' + si).classList.add('show');
      document.getElementById('ea-' + si).className = 'avatar idle';
      document.getElementById('ha-' + si).className = 'avatar idle';
      document.getElementById('ei-' + si).classList.remove('on');
      document.getElementById('hi-' + si).classList.remove('on');
    }, 350);
    setTimeout(function(){ document.getElementById('av-' + si).classList.add('show'); }, 820);
    setTimeout(function(){ document.getElementById('ins-' + si).classList.add('show'); }, 1300);
    return;
  }
  var line = s.lines[li];
  var isEmp = line.who === 'employee';
  var dl = document.getElementById('dl-' + si);
  document.getElementById('ea-' + si).className = isEmp ? 'avatar speaking' : 'avatar idle';
  document.getElementById('ha-' + si).className = isEmp ? 'avatar idle' : 'avatar speaking';
  document.getElementById('ei-' + si).classList.toggle('on', isEmp);
  document.getElementById('hi-' + si).classList.toggle('on', !isEmp);
  var name = isEmp ? s.empName : s.hrName;
  var cls = isEmp ? 'employee' : 'hrbp';
  if (line.typing) {
    var tw = document.createElement('div');
    tw.className = 'msg hrbp show';
    tw.innerHTML = '<div class="spk-tag">' + name + '</div><div class="typing-bubble show"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
    dl.appendChild(tw);
    dl.scrollTop = dl.scrollHeight;
    timer = setTimeout(function(){ tw.remove(); addBubble(si, li, line, name, cls, dl); }, 1350);
    return;
  }
  addBubble(si, li, line, name, cls, dl);
}

function addBubble(si, li, line, name, cls, dl) {
  var el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerHTML = '<div class="spk-tag">' + name + '</div><div class="bubble">' + line.text + '</div>';
  dl.appendChild(el);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      el.classList.add('show');
      dl.scrollTop = dl.scrollHeight;
    });
  });
  var delay = Math.min(2400, 700 + line.text.length * 22);
  timer = setTimeout(function(){ play(si, li + 1); }, delay);
}

function nextScene() { if (cur < scenarios.length - 1) show(cur + 1); }
function prevScene() { if (cur > 0) show(cur - 1); }
function replayScene() { show(cur, false); }
function jumpTo(idx) { show(idx); }

(function(){
  var c = document.getElementById('particles');
  for (var i = 0; i < 8; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var sz = 14 + Math.random() * 36;
    p.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;left:' + (Math.random()*100) + '%;animation-duration:' + (13+Math.random()*22) + 's;animation-delay:-' + (Math.random()*22) + 's;opacity:' + (0.12+Math.random()*0.2) + ';';
    c.appendChild(p);
  }
})();

// Touch swipe disabled - use Question selector or Next/Prev buttons to navigate

init();
